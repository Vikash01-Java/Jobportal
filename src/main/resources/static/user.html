<!DOCTYPE html>
<html>
<head>
<title>User Panel</title>
<style>
body{background:#0f172a;color:white;font-family:Arial}
.card{background:#1e293b;padding:20px;margin:20px}
button{padding:5px;background:green;color:white;border:none}
</style>
</head>

<body>

<h1>User Panel - Apply Jobs</h1>

<div id="jobs"></div>

<script>
const JOB_API = "http://localhost:8080/api/jobs";
const APPLY_API = "http://localhost:8080/api/applications";

// Load Jobs
function loadJobs(){
 fetch(JOB_API)
 .then(res=>res.json())
 .then(data=>{
   let html="";
   data.forEach(j=>{
     html+=`
       <div class="card">
         ${j.title} - ${j.company}
         <button onclick="applyJob(${j.id})">Apply</button>
       </div>
     `;
   });
   document.getElementById("jobs").innerHTML=html;
 });
}

// Apply Job
function applyJob(jobId){
 let app = {
   userName:"Vikas",
   jobId:jobId,
   status:"PENDING"
 };

 fetch(APPLY_API,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(app)
 })
 .then(()=>alert("Applied Successfully"));
}

loadJobs();
</script>

</body>
</html>
