<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <title>Applications</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>📄 Apply for Job</h2>

<div class="card">
    <input type="number" id="userId" placeholder="User ID">
    <input type="number" id="jobId" placeholder="Job ID">
    <input type="text" id="status" placeholder="Status">
    <button onclick="applyJob()">Apply</button>
</div>

<h3>🔍 Get Application By ID</h3>
<input type="number" id="appIdSearch" placeholder="Enter Application ID">
<button onclick="getApplicationById()">Search</button>

<br><br>

<button onclick="loadApplications()">Load All Applications</button>

<div id="appList"></div>

<script src="js/app.js"></script>

<script>
    loadApplications();
</script>

</body>
</html>
